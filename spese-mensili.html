<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spese Mensili">

<title>Spese Mensili</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d0d14;--bg2:#12121c;--bg3:#1a1a26;--b1:#1e1e2c;--b2:#2a2a3e;--tx:#f0ede8;--mu:#555;--mu2:#777;--ac:#3d6bfd;--ac2:#6b8aff;--bl:#a0c4ff;--rd:#EF5350;--or:#FFB300;--gn:#4CAF50;--g2:#6dcc6d}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac)!important}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* ── Login ── */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at 50% 0%,#1a1a3e,var(--bg) 70%)}
#login h1{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
#login .sub{color:var(--mu2);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.lcard{background:var(--bg2);border:1px solid var(--b2);border-radius:24px;padding:28px 20px;width:100%;max-width:340px;margin-bottom:20px}
.lcard .ico{font-size:48px;margin-bottom:16px}
.lcard h2{font-size:18px;font-weight:600;margin-bottom:6px}
.lcard p{color:var(--mu2);font-size:13px;line-height:1.6;margin-bottom:24px}
.linfo{font-size:11px;color:var(--mu);line-height:2}
.linfo span{color:var(--g2)}
/* ── App ── */
#app{display:none;flex-direction:column;height:100vh}
#app.on{display:flex}
/* ── Header ── */
#hd{background:var(--bg);border-bottom:1px solid var(--b1);padding:16px 18px 0;position:sticky;top:0;z-index:10;flex-shrink:0}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start;max-width:480px;margin:0 auto}
.hd-top h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;letter-spacing:-.5px}
.hd-sub{font-size:10px;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.hd-right{text-align:right}
.hd-lbl{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.hd-amt{font-size:22px;color:var(--bl);font-weight:600;letter-spacing:-.5px}
.nav{display:flex;gap:4px;margin:12px auto 0;max-width:480px}
.nav button{flex:1;padding:9px 0;border-radius:10px;border:none;background:transparent;color:var(--mu);font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.nav button.on{color:var(--bl);border-bottom-color:var(--ac)}
/* ── Content ── */
#cnt{flex:1;overflow-y:auto;padding:18px;max-width:480px;width:100%;margin:0 auto;padding-bottom:48px}
/* ── Buttons ── */
.brow{display:flex;gap:8px;margin-bottom:8px}
.bact{flex:1;padding:14px 10px;border-radius:14px;border:2px dashed var(--ac);background:rgba(61,107,253,.06);color:var(--bl);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s}
.bact:active{transform:scale(.97)}
.bact .ico{font-size:24px}
.bact .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.bpicker{width:100%;padding:11px;border-radius:12px;border:1px solid #1c3a1a;background:#0d1e0d;color:var(--g2);font-size:13px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500}
.bsm{width:100%;padding:9px;border-radius:10px;border:1px solid var(--b1);background:transparent;color:var(--mu2);font-size:12px;cursor:pointer;margin-bottom:14px;letter-spacing:1px}
.bpri{flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(61,107,253,.3)}
.bsec{flex:1;padding:13px;border-radius:12px;border:2px solid var(--b2);background:transparent;color:var(--mu2);font-size:14px;cursor:pointer}
.bdl{width:100%;margin-top:6px;padding:13px;border-radius:14px;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500}
.bdl.xl{background:linear-gradient(135deg,#1b3a1b,#2a5a2a);color:var(--g2)}
.bdl.pdf{background:linear-gradient(135deg,#1a1a3e,#2a2a5e);color:var(--bl)}
.bdl.q8{background:linear-gradient(135deg,#3a1b1b,#5a2a2a);color:#ff8a80}
.lbar{width:100%;padding:14px;border-radius:14px;border:2px dashed var(--b1);background:#10101a;color:var(--mu);font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.sp{display:inline-block;animation:spin 1s linear infinite}
/* ── Cards ── */
.card{background:var(--bg2);border-radius:14px;overflow:hidden;border:1px solid var(--b1);animation:fadeUp .3s ease;margin-bottom:8px}
.ci{display:flex}
.cimg{width:64px;height:64px;object-fit:cover;flex-shrink:0}
.cph{width:64px;height:64px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.cb{padding:10px 12px;flex:1}
.ct{display:flex;justify-content:space-between;align-items:flex-start}
.cn{font-size:13px;font-weight:600;color:var(--tx)}
.cd{font-size:10px;color:var(--mu);margin-top:1px}
.ca{font-size:15px;font-weight:700}
.cc{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.badge{font-size:10px;padding:2px 7px;border-radius:5px}
.bdel{background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:0 2px}
.err{margin-bottom:12px;padding:10px 14px;background:#3e1515;border-radius:12px;color:#ff8a80;font-size:12px}
.empty{text-align:center;color:var(--mu);margin-top:48px}
.empty .ico{font-size:52px;margin-bottom:10px}
.empty .t1{font-size:14px;color:var(--mu2)}
.empty .t2{font-size:11px;color:#3a3a50;margin-top:5px}
/* ── Modal ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.ovc{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mo{background:#14141f;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:24px 18px 34px;max-height:92vh;overflow-y:auto;border-top:2px solid var(--b2);animation:slideUp .3s ease}
.moc{background:#14141f;border-radius:20px;padding:22px;width:100%;max-width:340px;border:1px solid var(--b2)}
.mts{font-size:11px;letter-spacing:3px;color:var(--mu2);text-transform:uppercase;text-align:center;margin-bottom:3px}
.mt{font-size:19px;font-weight:700;font-family:'Playfair Display',serif;text-align:center;margin-bottom:14px}
.mr{display:flex;gap:10px;margin-top:8px}
/* ── Form ── */
.lb{font-size:11px;color:var(--mu2);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.ip{width:100%;background:#1a1a28;border:1px solid var(--b2);border-radius:10px;padding:9px 11px;color:var(--tx);font-size:14px;margin-bottom:12px;font-family:'DM Sans',sans-serif}
.pr{display:flex;gap:7px;margin-bottom:12px}
.pb{flex:1;padding:7px 0;border-radius:9px;border:2px solid var(--b2);background:transparent;color:var(--mu2);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.pa{border-color:#5b7ffd!important;background:#5b7ffd20!important;color:#5b7ffd!important}
.fuel{border-top:1px solid var(--b2);padding-top:12px;margin-bottom:4px}
.ft{color:var(--rd);font-size:11px;margin-bottom:8px}
.kmh{background:#1a2a1a;border:1px solid #2a5a2a;border-radius:8px;padding:7px 11px;margin-bottom:9px;font-size:11px;color:var(--g2)}
/* ── Riepilogo ── */
.tabs{display:flex;gap:5px;margin-bottom:16px}
.tb{flex:1;padding:8px 0;border-radius:9px;border:none;background:transparent;color:var(--mu);font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid transparent;font-weight:500;transition:all .2s}
.tb.on{background:#1c2540;color:var(--bl);border-bottom-color:var(--ac)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:460px;font-family:'DM Sans',sans-serif}
th{padding:8px 7px;color:var(--mu);text-align:left;border-bottom:1px solid var(--b1);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:500;white-space:nowrap}
td{padding:9px 7px;font-size:12px;border-bottom:1px solid #171724}
tfoot td{background:#1c1c2e;font-weight:700;border:none}
.cl{background:var(--bg2);border-radius:14px;overflow:hidden}
.cr{display:grid;grid-template-columns:1fr 38px 85px;padding:11px 15px;border-bottom:1px solid #0f0f1a;align-items:center}
.crh{padding:9px 15px;border-bottom:1px solid var(--b1)}
.crf{background:#1c1c2e}
/* ── Export section ── */
.expsec{background:var(--bg2);border-radius:14px;padding:14px;margin-top:10px;border:1px solid var(--b1)}
.exptt{font-size:11px;color:var(--mu2);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
/* ── Session (foto in corso) ── */
.sess{background:#0d1e0d;border:1px solid #1a3a1a;border-radius:14px;padding:14px;margin-bottom:10px}
.sess-t{font-size:13px;font-weight:600;color:var(--g2);margin-bottom:4px}
.sess-s{font-size:11px;color:var(--mu2);margin-bottom:12px}
.sess-count{font-size:28px;font-weight:700;color:var(--g2);text-align:center;margin:8px 0}
</style>
</head>
<body>
<!-- Login -->
<div id="login">
  <h1>Spese Mensili</h1>
  <p class="sub">D'Aniello Giuseppe</p>
  <div class="lcard">
    <div class="ico">💼</div>
    <h2>Accedi con Google</h2>
    <p>Selezioni tu i file da Drive. L'app non accede al Drive in automatico.</p>
    <button class="bpri" style="width:100%;padding:14px;border-radius:12px;font-size:15px" onclick="doLogin()">🔐 Accedi con Google</button>
  </div>
  <div class="linfo">
    <span>✓</span> Scegli tu quali file importare<br>
    <span>✓</span> Nessun accesso automatico al Drive<br>

  </div>
</div>

<!-- App -->
<div id="app">
  <div id="hd">
    <div class="hd-top">
      <div><h1>Spese Mensili</h1><div class="hd-sub">D'Aniello Giuseppe</div></div>
      <div class="hd-right"><div class="hd-lbl">Totale</div><div class="hd-amt" id="tot">€ 0.00</div></div>
    </div>
    <div class="nav">
      <button class="on" onclick="vista('home')">📋 Scontrini</button>
      <button onclick="vista('rep')">📊 Riepilogo</button>
      <button onclick="vista('exp')">📥 Esporta</button>
    </div>
  </div>
  <div id="cnt"></div>
</div>

<!-- Google Identity Services only (no Picker needed) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ═══════════════════════ CONFIG ═══════════════════════
const CLIENT_ID='942404693526-riko3njld4ekjtcf44g194luscmv9oao.apps.googleusercontent.com';
const API_KEY='AIzaSyCTsM4gHFG9qSF02dsNwO0rD6WUpo5-a9g';
const SCOPES='https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';

const MESI=['','GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO','LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
const CATS=[
  {n:'Alimentari',e:'🛒',c:'#4CAF50'},{n:'Ristoranti',e:'🍽️',c:'#FF7043'},
  {n:'Farmacia',e:'💊',c:'#42A5F5'},{n:'Trasporti',e:'🚌',c:'#AB47BC'},
  {n:'Casa',e:'🏠',c:'#FFB300'},{n:'Automobile',e:'🚗',c:'#78909C'},
  {n:'Gasolio',e:'⛽',c:'#EF5350'},{n:'Altro',e:'📦',c:'#8D6E63'}
];
const COLS=['#4CAF50','#FF7043','#42A5F5','#AB47BC','#FFB300','#78909C','#EF5350','#8D6E63','#26C6DA','#EC407A','#7E57C2','#26A69A','#FFA726','#5C6BC0'];
const EMJS=['🛒','🍽️','💊','🚌','🏠','🚗','⛽','📦','💈','🏋️','🎬','✈️','🐾','📚','🎮','💻','👔','🌿'];

// ═══════════════════════ STATE ═══════════════════════
let tok=null, gapiOk=false, gisOk=false;
let sc=[], cats=[], kmP=139900, cur='home';

function load(){
  try{sc=JSON.parse(localStorage.getItem('sm_sc')||'[]');}catch{sc=[];}
  try{cats=JSON.parse(localStorage.getItem('sm_cat')||'null')||[...CATS];}catch{cats=[...CATS];}
  try{kmP=JSON.parse(localStorage.getItem('sm_km')||'139900');}catch{kmP=139900;}
  try{tok=localStorage.getItem('sm_tok')||null;}catch{}
}
function save(){
  try{localStorage.setItem('sm_sc',JSON.stringify(sc.map(({preview,...r})=>r)));}catch{}
  try{localStorage.setItem('sm_cat',JSON.stringify(cats));}catch{}
  try{localStorage.setItem('sm_km',JSON.stringify(kmP));}catch{}
}

// ═══════════════════════ AUTH ═══════════════════════
function initGis(){
  window._tc=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(r)=>{if(r.access_token){tok=r.access_token;localStorage.setItem('sm_tok',tok);startApp();}}
  });
  gisOk=true;
}
function doLogin(){
  if(!gisOk){setTimeout(doLogin,300);return;}
  window._tc.requestAccessToken({prompt:'consent'});
}

// ═══════════════════════ AI ═══════════════════════
const AI_HDR={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};

async function aiImg(b64,mt){
  const nc=cats.map(c=>c.n).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:AI_HDR,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt||'image/jpeg',data:b64}},
          {type:'text',text:`Analizza questo scontrino. Rispondi SOLO JSON valido, niente markdown, niente testo extra.\n{"negozio":"nome negozio","data":"GG/MM/AAAA","totale":importo_numerico,"categoria":"una tra: ${nc}","pagamento":"POS o Contanti","commissioni":null,"km":null,"litri":null,"prezzoLitro":null}\nSe distributore carburante: compila km litri prezzoLitro.`}
        ]}]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const txt=d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    return JSON.parse(txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1));
  }catch(e){console.error('AI err:',e);return {negozio:'',data:'',totale:'',categoria:'Altro',pagamento:'POS'};}
}
async function aiPdf(txt){
  const nc=cats.map(c=>c.n).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:AI_HDR,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:`Se è uno scontrino di pagamento rispondi con JSON: {"negozio":"...","data":"GG/MM/AAAA","totale":numero,"categoria":"una tra: ${nc}","pagamento":"POS o Contanti","commissioni":null,"km":null,"litri":null,"prezzoLitro":null}. Se NON è uno scontrino: {"skip":true}.\n\nTesto:\n${txt.slice(0,3000)}`}]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const t=d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    return JSON.parse(t.slice(t.indexOf('{'),t.lastIndexOf('}')+1));
  }catch(e){console.error('PDF err:',e);return {skip:true};}
}
function b64(blob){return new Promise((ok,ko)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(',')[1]);r.onerror=ko;r.readAsDataURL(blob);});}

// ═══════════════════════ DRIVE BROWSER (no Picker) ═══════════════════════
const ZZZ_ID='1spHTpaE1kQKTlzMc9C0bn7KXG89hne2L';

// Naviga Drive con API diretta — nessun Picker esterno
async function driveList(parentId){
  // Encode query correttamente
  const q=encodeURIComponent(`'${parentId}' in parents and trashed=false`);
  const url=`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=name&fields=files(id,name,mimeType)&pageSize=50&includeItemsFromAllDrives=true&supportsAllDrives=true`;
  const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
  const d=await r.json();
  if(d.error){console.error('Drive API error:',d.error);throw new Error(d.error.message);}
  return d.files||[];
}

function openPicker(){
  if(!tok){
    // Token scaduto — richiedi nuovo login
    window._tc.requestAccessToken({prompt:''});
    return;
  }
  _dbSelected=[];
  mostraBrowser(ZZZ_ID,'📁 ZZZ NOTA SPESE',[]);
}

async function mostraBrowser(folderId, folderName, breadcrumb){
  close_('_db');
  const ov=document.createElement('div');ov.className='ov';ov.id='_db';

  ov.innerHTML=`<div class="mo">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:15px;font-weight:700;font-family:'Playfair Display',serif">☁️ Drive</div>
      <button onclick="close_('_db')" style="background:none;border:none;color:var(--mu2);font-size:20px;cursor:pointer">✕</button>
    </div>
    <!-- Breadcrumb -->
    <div style="font-size:11px;color:var(--mu2);margin-bottom:10px;padding:6px 10px;background:var(--bg3);border-radius:8px;line-height:1.6">
      ${folderName}
    </div>
    <div id="db-list" style="min-height:120px;display:flex;align-items:center;justify-content:center">
      <span style="color:var(--mu);font-size:13px">⏳ Carico...</span>
    </div>
    <div id="db-sel" style="display:none;margin-top:10px">
      <div style="font-size:11px;color:var(--g2);margin-bottom:8px" id="db-sel-count">0 file selezionati</div>
      <button class="bpri" style="width:100%" onclick="importaSelezionati()">✓ Importa selezionati</button>
    </div>
    <button class="bsec" style="width:100%;margin-top:8px" onclick="close_('_db')">Annulla</button>
  </div>`;
  ov._breadcrumb=breadcrumb;
  ov._selected=[];
  document.body.appendChild(ov);

  // Carica contenuto cartella
  try{
    const files=await driveList(folderId);
    const listEl=document.getElementById('db-list');
    if(!files.length){listEl.innerHTML='<span style="color:var(--mu);font-size:13px">Cartella vuota</span>';return;}

    const folders=files.filter(f=>f.mimeType==='application/vnd.google-apps.folder');
    const docs=files.filter(f=>f.mimeType!=='application/vnd.google-apps.folder'&&
      (f.mimeType.startsWith('image/')||f.mimeType==='application/pdf'));

    // Salva dati cartelle nell'overlay per navigazione sicura
    const newBreadcrumb=[...breadcrumb,{id:folderId,name:folderName}];
    ov._folderData={folders, docs, breadcrumb:newBreadcrumb, currentId:folderId, currentName:folderName};

    let html='';

    // Torna indietro
    if(breadcrumb.length>0){
      html=`<div id="db-back" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:#1a1a0d;border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid #2a2a1a">
        <span style="font-size:18px">⬆️</span>
        <span style="font-size:13px;color:var(--or)">↑ Torna su</span>
      </div>`;
    }

    // Cartelle navigabili
    folders.forEach((f,idx)=>{
      html+=`<div data-folder-idx="${idx}" style="display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg2);border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid var(--b1)">
        <span style="font-size:20px">📁</span>

let _dbSelected=[];
window.toggleFile=(id,name,mime)=>{
  const idx=_dbSelected.findIndex(f=>f.id===id);
  const chk=document.getElementById('chk-'+id);
  const row=document.getElementById('fi-'+id);
  if(idx>=0){
    _dbSelected.splice(idx,1);
    if(chk)chk.textContent='○';if(chk)chk.style.color='var(--mu)';
    if(row)row.style.borderColor='var(--b1)';if(row)row.style.background='var(--bg2)';
  }else{
    _dbSelected.push({id,name,mimeType:mime});
    if(chk)chk.textContent='✓';if(chk)chk.style.color='var(--g2)';
    if(row)row.style.borderColor='var(--gn)';if(row)row.style.background='#0d1a0d';
  }

  if(selDiv)selDiv.style.display=_dbSelected.length>0?'block':'none';

async function importaSelezionati(){
  const files=[..._dbSelected];
  _dbSelected=[];
  close_('_db');
  if(!files.length)return;
  let i=0;
  const next=async()=>{
    if(i>=files.length){render();return;}
    const f=files[i];
    spin(true,`Analizzo ${f.name} (${i+1}/${files.length})...`);
    try{
      let p=null;
      if(f.mimeType&&f.mimeType.startsWith('image/')){
        const res=await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,{headers:{Authorization:'Bearer '+tok}});
        const blob=await res.blob();
        const data=await b64(blob);
        p=await aiImg(data,f.mimeType);
      }else if(f.mimeType==='application/pdf'){
        const res=await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}/export?mimeType=text/plain`,{headers:{Authorization:'Bearer '+tok}});
        if(res.ok){const txt=await res.text();p=await aiPdf(txt);}
      }
      spin(false);
      if(p&&!p.skip){
        confirm_({...p},(form)=>{sc.push({...form,id:Date.now(),fromDrive:true});if(form.categoria==='Gasolio'&&form.km)kmP=parseFloat(form.km);save();i++;next();},{idx:i,tot:files.length,fname:f.name,fromDrive:true});
      }else{i++;next();}
    }catch(e){spin(false);i++;next();}
  };
  next();
}

// Legge i km finali dell'Excel del mese precedente da Drive
async function leggiKmMesePrecedente(annoId, mesePrecedente){
  try{
    const mm=String(mesePrecedente).padStart(2,'0');
    // Cerca la cartella del mese precedente
    const res=await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${annoId}' in parents and mimeType='application/vnd.google-apps.folder' and name contains '${mm}'&fields=files(id,name)`,
      {headers:{Authorization:'Bearer '+tok}});
    const data=await res.json();
    if(!data.files||!data.files.length)return null;
    const meseId=data.files[0].id;
    // Cerca il file Excel dentro quella cartella
    const res2=await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${meseId}' in parents and (name contains '.xlsx' or mimeType='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')&fields=files(id,name)`,
      {headers:{Authorization:'Bearer '+tok}});
    const data2=await res2.json();
    if(!data2.files||!data2.files.length)return null;
    const xlsxId=data2.files[0].id;
    // Scarica ed analizza con AI per trovare ultimi km Q8
    const res3=await fetch(`https://www.googleapis.com/drive/v3/files/${xlsxId}/export?mimeType=text/csv`,{headers:{Authorization:'Bearer '+tok}});
    if(!res3.ok)return null;
    const csv=await res3.text();
    // Cerca l'ultimo valore numerico nella colonna km (cerca pattern di km > 10000)
    const matches=csv.match(/\b(\d{5,6})\b/g);
    if(!matches)return null;
    const nums=matches.map(Number).filter(n=>n>10000&&n<999999);
    if(!nums.length)return null;
    return nums[nums.length-1];
  }catch(e){console.error('km err:',e);return null;}
}

// Session: prende foto in sequenza finché l'utente non dice "ho finito"
let sessQueue=[];
let sessActive=false;
let sessResolve=null;

function startSessione(){
  sessQueue=[];
  sessActive=true;
  render(); // mostra schermata sessione
}

function addFotoSess(file){
  // aggiunge foto alla coda sessione
  sessQueue.push(file);
  document.getElementById('sess-cnt')&&(document.getElementById('sess-cnt').textContent=sessQueue.length);
}

async function fineSessione(){
  sessActive=false;
  if(!sessQueue.length){render();return;}
  let i=0;
  const next=async()=>{
    if(i>=sessQueue.length){render();return;}
    const file=sessQueue[i];
    spin(true,`Analizzo foto ${i+1}/${sessQueue.length}...`);
    const prev=URL.createObjectURL(file);
    try{
      const data=await b64(file);
      const p=await aiImg(data,file.type||'image/jpeg');
      spin(false);
      confirm_({...p,preview:prev},form=>{sc.push({...form,id:Date.now(),preview:prev});if(form.categoria==='Gasolio'&&form.km)kmP=parseFloat(form.km);save();i++;next();},{idx:i,tot:sessQueue.length});
    }catch{
      spin(false);
      confirm_({negozio:'',data:'',totale:'',categoria:'Altro',pagamento:'POS',preview:prev},form=>{sc.push({...form,id:Date.now(),preview:prev});save();i++;next();},{idx:i,tot:sessQueue.length});
    }
  };
  next();
}

// ═══════════════════════ HANDLE FILE (singolo) ═══════════════════════
async function handleFile(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  if(sessActive){addFotoSess(file);renderSess();return;}
  spin(true,'Analisi AI...');
  const prev=URL.createObjectURL(file);
  try{
    const data=await b64(file);
    const p=await aiImg(data,file.type||'image/jpeg');
    spin(false);
    confirm_({...p,preview:prev},form=>{sc.push({...form,id:Date.now(),preview:prev});if(form.categoria==='Gasolio'&&form.km)kmP=parseFloat(form.km);save();render();});
  }catch{spin(false);confirm_({negozio:'',data:'',totale:'',categoria:'Altro',pagamento:'POS',preview:prev},form=>{sc.push({...form,id:Date.now(),preview:prev});save();render();});}
}

// Campi obbligatori: data e totale. Negozio obbligatorio.
// Se mancanti, evidenzia in rosso e blocca il salvataggio.
function campiMancanti(d){
  // Determina quali campi sono stati rilevati dall'AI
  const mancanti=[];
  if(!d.negozio||d.negozio.trim()==='')mancanti.push('negozio');
  if(!d.data||d.data.trim()==='')mancanti.push('data');
  if(!d.totale&&d.totale!==0)mancanti.push('totale');
  return mancanti;
}

window.checkReady=()=>{
  // Aggiorna dinamicamente il bordo dei campi mentre l'utente li compila
  const fields={fn:'negozio',fd:'data',ft:'totale'};
  for(const [id,campo] of Object.entries(fields)){
    const el=document.getElementById(id);
    if(!el)continue;
    if(el.value.trim()){
      el.style.borderColor='var(--gn)'; // verde = compilato
      el.style.background='#0d1a0d';
    }
  }
};

window.toggleF=()=>{const f=document.getElementById('ff');if(f)f.style.display=document.getElementById('fc')?.value==='Gasolio'?'block':'none';};
window.selP=(btn,v)=>{document.querySelectorAll('.pb').forEach(b=>b.classList.remove('pa'));btn.classList.add('pa');const r=document.getElementById('fcr');if(r)r.style.display=(v==='Contanti'||v==='Entrambi')?'block':'none';};

window.doConf=()=>{
  const el=document.getElementById('_mc');if(!el)return;
  // Valida campi obbligatori
  const negozio=document.getElementById('fn')?.value?.trim()||'';
  const data=document.getElementById('fd')?.value?.trim()||'';
  const totale=document.getElementById('ft')?.value||'';
  const errori=[];
  if(!negozio)errori.push('Negozio');
  if(!data)errori.push('Data');
  if(!totale)errori.push('Importo');

  if(errori.length>0){
    // Mostra errore e evidenzia campi
    const errBox=document.getElementById('err-conf');
    if(errBox){errBox.style.display='block';errBox.textContent='⚠️ Compila i campi obbligatori: '+errori.join(', ');}
    // Evidenzia in rosso i campi vuoti
    if(!negozio){const e=document.getElementById('fn');if(e){e.style.borderColor='#ff4444';e.style.background='#1a0a0a';e.focus();}}
    else if(!data){const e=document.getElementById('fd');if(e){e.style.borderColor='#ff4444';e.style.background='#1a0a0a';e.focus();}}
    else if(!totale){const e=document.getElementById('ft');if(e){e.style.borderColor='#ff4444';e.style.background='#1a0a0a';e.focus();}}
    return; // BLOCCA — non va avanti
  }

  const pay=el.querySelector('.pa');
  const form={
    negozio,data,
    totale:document.getElementById('ft')?.value||'',
    categoria:document.getElementById('fc')?.value||'Altro',
    pagamento:pay?.textContent||'POS',
    contanti:document.getElementById('fco')?.value||'',
    commissioni:document.getElementById('fcomm')?.value||'',
    km:document.getElementById('fkm')?.value||'',
    litri:document.getElementById('flt')?.value||'',
    prezzoLitro:document.getElementById('fpl')?.value||''
  };
  const cb=el._cb;close_('_mc');if(cb)cb(form);
};

function renderCard(s){
  const cat=cats.find(c=>c.n===s.categoria)||{c:'#888',e:'📦'};
  const img=s.preview?`<img class="cimg" src="${s.preview}" alt="">`:`<div class="cph">${s.fromDrive?'☁️':'🧾'}</div>`;
  return `<div class="card"><div class="ci">${img}<div class="cb">
    <div class="ct"><div><div class="cn">${s.negozio||'—'}</div><div class="cd">${s.data||'n.d.'}</div></div>
    <div class="ca" style="color:${cat.c}">€ ${parseFloat(s.totale||0).toFixed(2)}</div></div>

window.swT=(btn,id)=>{document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');['tc','ts','tg'].forEach(t=>{const el=document.getElementById(t);if(el)el.style.display=t===id?'block':'none';});};

function rCat(){
  const tG=sc.reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
  const rows=cats.filter(cat=>sc.some(s=>s.categoria===cat.n)).map(cat=>{
    const n=sc.filter(s=>s.categoria===cat.n).length,tot=sc.filter(s=>s.categoria===cat.n).reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
    return `<div class="cr"><span style="font-size:13px">${cat.e} ${cat.n}</span><span style="color:var(--mu);text-align:center">${n}</span><span style="color:${cat.c};font-weight:700;text-align:right">€ ${tot.toFixed(2)}</span></div>`;
  }).join('');
  return `<div class="cl">
    <div class="cr crh"><span style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px">Categoria</span><span style="font-size:10px;color:var(--mu);text-align:center">N.</span><span style="font-size:10px;color:var(--mu);text-align:right">Totale</span></div>
    ${rows||'<div style="padding:18px;text-align:center;color:var(--mu)">Nessuna spesa</div>'}
    <div class="cr crf"><span style="color:var(--bl);font-size:13px">TOTALE</span><span style="color:var(--bl);text-align:center">${sc.length}</span><span style="color:var(--bl);font-weight:700;text-align:right">€ ${tG.toFixed(2)}</span></div>
  </div>`;
}
function rSpese(){
  const sp=sc.filter(s=>s.categoria!=='Gasolio').sort((a,b)=>a.data>b.data?1:-1);
  const tP=sp.filter(s=>s.pagamento!=='Contanti').reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
  const tC=sp.reduce((a,s)=>a+(parseFloat(s.contanti)||0),0);
  const tCo=sp.reduce((a,s)=>a+(parseFloat(s.commissioni)||0),0);
  return `<div class="tw"><table>
    <thead><tr><th>Data</th><th>Descrizione</th><th>Cat.</th><th style="text-align:right">POS €</th><th style="text-align:right">Cont. €</th><th style="text-align:right">Comm. €</th></tr></thead>
    <tbody>${sp.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--mu);padding:20px">Nessuna spesa</td></tr>':sp.map(s=>{
      const cat=cats.find(c=>c.n===s.categoria)||{c:'#888',e:'📦'};
      const pos=s.pagamento==='Contanti'?0:(parseFloat(s.totale)||0);
      const cont=s.pagamento==='Contanti'?(parseFloat(s.contanti||s.totale)||0):s.pagamento==='Entrambi'?(parseFloat(s.contanti)||0):0;
      return `<tr><td style="color:var(--mu);white-space:nowrap">${s.data||'—'}</td><td>${s.negozio||'—'}</td>
        <td><span style="background:${cat.c}22;color:${cat.c};border-radius:5px;padding:1px 6px;font-size:10px">${cat.e} ${s.categoria}</span></td>
        <td style="color:var(--bl);text-align:right">${pos>0?'€ '+pos.toFixed(2):'—'}</td>
        <td style="color:var(--or);text-align:right">${cont>0?'€ '+cont.toFixed(2):'—'}</td>
        <td style="color:var(--rd);text-align:right">${s.commissioni?'€ '+parseFloat(s.commissioni).toFixed(2):'—'}</td></tr>`;
    }).join('')}</tbody>
    ${sp.length>0?`<tfoot><tr><td colspan="3" style="color:var(--bl)">TOTALE</td><td style="color:var(--bl);text-align:right">€ ${tP.toFixed(2)}</td><td style="color:var(--or);text-align:right">€ ${tC.toFixed(2)}</td><td style="color:var(--rd);text-align:right">€ ${tCo.toFixed(2)}</td></tr></tfoot>`:''}
  </table></div>`;
}
function rGas(){
  const sp=sc.filter(s=>s.categoria==='Gasolio').sort((a,b)=>a.data>b.data?1:-1);
  const tS=sp.reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
  return `<div class="tw"><table>
    <thead><tr><th>Data</th><th>Km</th><th>Litri</th><th>€/Lt</th><th>Totale</th><th>Δ km</th><th>Lt/100</th></tr></thead>
    <tbody>${sp.length===0?'<tr><td colspan="7" style="text-align:center;color:var(--mu);padding:20px">Nessun rifornimento</td></tr>':sp.map((s,i)=>{
      const prev=sp[i-1];const kmN=parseFloat(s.km)||0;
      const pK=i===0?(parseFloat(s.kmPartenza)||kmP):(parseFloat(prev.km)||0);
      const dK=kmN&&pK?(kmN-pK):null;
      const lK=dK&&s.litri?(parseFloat(s.litri)/dK*100).toFixed(1):null;
      return `<tr><td style="color:var(--mu);white-space:nowrap">${s.data||'—'}</td>
        <td>${s.km?parseInt(s.km).toLocaleString():'—'}</td>
        <td>${s.litri?parseFloat(s.litri).toFixed(1):'—'}</td>
        <td style="color:var(--mu2)">${s.prezzoLitro?'€ '+parseFloat(s.prezzoLitro).toFixed(3):'—'}</td>
        <td style="color:var(--rd);font-weight:700">${s.totale?'€ '+parseFloat(s.totale).toFixed(2):'—'}</td>
        <td style="color:var(--mu2)">${dK!==null?Math.round(dK)+' km':'—'}</td>
        <td style="color:var(--or)">${lK?lK+' L':'—'}</td></tr>`;
    }).join('')}</tbody>
    ${sp.length>0?`<tfoot><tr><td colspan="4" style="color:var(--rd)">TOTALE</td><td style="color:var(--rd)">€ ${tS.toFixed(2)}</td><td colspan="2"></td></tr></tfoot>`:''}
  </table></div>`;
}

// ─── EXCEL ────────────────────────────────────────────
function expExcel(){
  const oggi=new Date();
  const mNum=oggi.getMonth()+1;
  const anno=oggi.getFullYear();
  const wb=XLSX.utils.book_new();

  // ── Foglio 1: Nota Spese ──
  const spGen=sc.filter(s=>s.categoria!=='Gasolio').sort((a,b)=>a.data>b.data?1:-1);
  // Header
  const nsData=[
    [`GENOVA - DIGA FASE B - C158 -`,'','','','','','','','',''],
    [`NOTA SPESA N. ${mNum} / ${String(anno).slice(2)} - D\'ANIELLO GIUSEPPE - Tessear n°4830********100`,'','','','','','','','',''],
    ['Giorno','Saldo Movimenti Carta','','Saldo contanti','Prelievo contanti','Pagamento in contanti','Pagamento con POS','Commissioni prelievo altre banche','DESCRIZIONE',''],
    ['mese precedente','- €','','','','','','','','']
  ];
  // Righe spese
  spGen.forEach(s=>{
    const pos=s.pagamento==='Contanti'?null:(parseFloat(s.totale)||null);
    const cont=s.pagamento==='Contanti'?(parseFloat(s.contanti||s.totale)||null):s.pagamento==='Entrambi'?(parseFloat(s.contanti)||null):null;
    const comm=s.commissioni?parseFloat(s.commissioni):null;
    nsData.push([s.data||'',null,null,cont,null,null,pos,comm,s.negozio||'','']);
  });
  // Totali
  const totPos=spGen.filter(s=>s.pagamento!=='Contanti').reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
  const totCont=spGen.reduce((a,s)=>a+(parseFloat(s.contanti)||0),0);
  const totComm=spGen.reduce((a,s)=>a+(parseFloat(s.commissioni)||0),0);
  nsData.push(['',null,null,totCont>0?totCont:null,null,null,totPos>0?totPos:null,totComm>0?totComm:null,'','']);
  nsData.push(['Residuo Carta','','','','','','','€ 0.00','','']);
  nsData.push(['Residuo Contanti','','','','','','',`-€ ${totPos.toFixed(2)}`,'','']);
  nsData.push(['Credito Totale','','','','','','',`-€ ${totPos.toFixed(2)}`,'','']);
  nsData.push(['','','','','',totPos>0?totPos:null,'','','','']);
  const ws1=XLSX.utils.aoa_to_sheet(nsData);
  XLSX.utils.book_append_sheet(wb,ws1,`Nota_Spesa_${String(mNum).padStart(2,'0')}-${String(anno).slice(2)}`);

  // ── Foglio 2: Gasolio Q8 ──
  const gasoline=sc.filter(s=>s.categoria==='Gasolio').sort((a,b)=>a.data>b.data?1:-1);
  const q8Data=[
    [`NOTA SPESA N.${mNum}/${String(anno).slice(2)} - Q8- D\'ANIELLO GIUSEPPE - Tessear n°****01***700*20025`],
    ['','',' '+kmP.toLocaleString()],
    ['Giorno','Saldo Movimenti Carta','Saldo contanti','Pagamento carta','Pagamento in contanti','','Commissioni prelievo altre banche','km','','lt','d km','Lt/km']
  ];
  let prevKm=kmP;
  gasoline.forEach(s=>{
    const km=parseFloat(s.km)||0;
    const dKm=km&&prevKm?(km-prevKm):null;
    const lt=s.litri?parseFloat(s.litri):null;
    const ltKm=dKm&&lt?(lt/dKm).toFixed(6):null;
    const tot=s.totale?parseFloat(s.totale):null;
    q8Data.push([s.data||'',null,null,tot,null,null,null,km?km.toLocaleString():null,s.prezzoLitro?parseFloat(s.prezzoLitro):null,lt,dKm?Math.round(dKm):null,ltKm]);
    if(km)prevKm=km;
  });
  const totQ8=gasoline.reduce((a,s)=>a+(parseFloat(s.totale)||0),0);
  q8Data.push([null,null,null,totQ8>0?totQ8:null,null,null,null,null,null,null,null,null]);
  q8Data.push(['Residuo Carta','','',`-€ ${totQ8.toFixed(2)}`]);
  q8Data.push(['Residuo Contanti','','',`€ ${totQ8.toFixed(2)}`]);
  q8Data.push(['Credito Totale','','','€ 0.00']);
  const ws2=XLSX.utils.aoa_to_sheet(q8Data);
  XLSX.utils.book_append_sheet(wb,ws2,`Gasolio Q8 ${String(mNum).padStart(2,'0')}_${String(anno).slice(2)}`);

  XLSX.writeFile(wb,`Nota_spesa_${String(mNum).padStart(2,'0')}_${anno}.xlsx`);
}

        <span>Lt/100: <b>${ltKm?ltKm+' L':'—'}</b></span>

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  render();
  // Prova a caricare i km del mese precedente da Drive
  await aggiornaKmDaDrive();
}

async function aggiornaKmDaDrive(){
  try{
    const oggi=new Date();
    const mesePrec=oggi.getMonth()===0?12:oggi.getMonth(); // mese precedente (1-12)
    const annoPrec=oggi.getMonth()===0?oggi.getFullYear()-1:oggi.getFullYear();
    // Trova cartella anno
    const res=await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${ZZZ_ID}' in parents and mimeType='application/vnd.google-apps.folder' and name='${annoPrec}'&fields=files(id,name)`,
      {headers:{Authorization:'Bearer '+tok}});
    const data=await res.json();
    if(!data.files||!data.files.length)return;
    const km=await leggiKmMesePrecedente(data.files[0].id, mesePrec);
    if(km&&km!==kmP){
      kmP=km;
      save();
      console.log('Km aggiornati da Drive:', km);
    }
  }catch(e){console.error('aggiorna km err:',e);}
}
window.onload=()=>{
  load();
  gapiOk=true; // Non usiamo più il Picker, Drive API diretta
  const t=setInterval(()=>{if(typeof google!=='undefined'&&google.accounts){clearInterval(t);initGis();}},300);
  if(tok)startApp();else document.getElementById('login').style.display='flex';
};
